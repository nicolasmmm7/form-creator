$kind: http-request
name: User Login
method: POST
url: '{{base_url}}/api/usuarios/login/'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "john.doe@example.com",
      "password": "user_password"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      
      pm.test("Response has valid JSON structure", function () {
          pm.response.to.be.json;
          const responseJson = pm.response.json();
          
          pm.test("Response contains token", function () {
              pm.expect(responseJson).to.have.property('token');
              pm.expect(responseJson.token).to.be.a('string');
              pm.expect(responseJson.token).to.not.be.empty;
          });
          
          pm.test("Response contains user_id", function () {
              pm.expect(responseJson).to.have.property('user_id');
              pm.expect(responseJson.user_id).to.be.a('string');
              pm.expect(responseJson.user_id).to.not.be.empty;
          });
          
          pm.test("Response contains user details", function () {
              pm.expect(responseJson).to.have.property('user');
              pm.expect(responseJson.user).to.have.property('email');
              pm.expect(responseJson.user.email).to.be.a('string');
              pm.expect(responseJson.user.email).to.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
          });
          
          // Store values for subsequent requests
          if (responseJson.token) {
              pm.environment.set("firebase_token", responseJson.token);
          }
          if (responseJson.user_id) {
              pm.environment.set("user_id", responseJson.user_id);
          }
      });
      
      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });
      
      // Test for authentication failure scenarios
      if (pm.response.code === 401) {
          pm.test("Unauthorized - Invalid credentials", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
              pm.expect(responseJson.error).to.include('Invalid');
          });
      }
      
      if (pm.response.code === 400) {
          pm.test("Bad Request - Missing email or password", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
          });
      }
      
      if (pm.response.code === 404) {
          pm.test("User not found", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
              pm.expect(responseJson.error).to.include('not found');
          });
      }
    language: text/javascript