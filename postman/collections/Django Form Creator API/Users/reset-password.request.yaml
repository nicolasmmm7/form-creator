$kind: http-request
name: Reset Password
method: POST
url: '{{base_url}}/api/usuarios/reset-password/'
order: 7000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "john.doe@example.com"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      
      pm.test("Response has valid JSON structure", function () {
          pm.response.to.be.json;
          const responseJson = pm.response.json();
          
          pm.test("Response contains success confirmation", function () {
              pm.expect(responseJson).to.have.property('success');
              pm.expect(responseJson.success).to.be.true;
          });
          
          pm.test("Response contains message", function () {
              pm.expect(responseJson).to.have.property('message');
              pm.expect(responseJson.message).to.be.a('string');
              pm.expect(responseJson.message).to.not.be.empty;
          });
          
          pm.test("Response contains email confirmation", function () {
              pm.expect(responseJson).to.have.property('email');
              pm.expect(responseJson.email).to.be.a('string');
              pm.expect(responseJson.email).to.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
              
              // Verify email matches request
              const requestBody = JSON.parse(pm.request.body.raw);
              pm.expect(responseJson.email).to.equal(requestBody.email);
          });
          
          pm.test("Response contains reset token info", function () {
              pm.expect(responseJson).to.have.property('reset_token_sent');
              pm.expect(responseJson.reset_token_sent).to.be.true;
          });
          
          pm.test("Response contains expiration info", function () {
              pm.expect(responseJson).to.have.property('expires_in');
              pm.expect(responseJson.expires_in).to.be.a('string');
              pm.expect(responseJson.expires_in).to.not.be.empty;
          });
          
          pm.test("Security - No sensitive data exposed", function () {
              pm.expect(responseJson).to.not.have.property('reset_token');
              pm.expect(responseJson).to.not.have.property('password');
              pm.expect(responseJson).to.not.have.property('user_id');
          });
      });
      
      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });
      
      // Test for validation errors
      if (pm.response.code === 400) {
          pm.test("Bad Request - Email validation errors", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
              
              if (responseJson.error.includes('email')) {
                  pm.test("Invalid email format", function () {
                      pm.expect(responseJson.error).to.include('email');
                  });
              }
              
              if (responseJson.error.includes('required')) {
                  pm.test("Missing required email field", function () {
                      pm.expect(responseJson.error).to.include('required');
                  });
              }
          });
      }
      
      if (pm.response.code === 404) {
          pm.test("Not Found - Email not registered", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
              pm.expect(responseJson.error).to.include('not found');
          });
      }
      
      if (pm.response.code === 429) {
          pm.test("Too Many Requests - Rate limiting", function () {
              const responseJson = pm.response.json();
              pm.expect(responseJson).to.have.property('error');
              pm.expect(responseJson.error).to.include('rate limit');
          });
      }
      
      // Email validation tests
      pm.test("Email format validation", function () {
          const requestBody = JSON.parse(pm.request.body.raw);
          
          if (requestBody.email) {
              pm.test("Request email has valid format", function () {
                  pm.expect(requestBody.email).to.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
              });
              
              pm.test("Email is not empty", function () {
                  pm.expect(requestBody.email.trim()).to.not.be.empty;
              });
              
              pm.test("Email length is reasonable", function () {
                  pm.expect(requestBody.email.length).to.be.within(5, 254);
              });
          }
      });
      
      // Business logic validation
      pm.test("Password reset business logic", function () {
          if (pm.response.code === 200) {
              const responseJson = pm.response.json();
              
              pm.test("Successful reset should confirm token sent", function () {
                  pm.expect(responseJson.reset_token_sent).to.be.true;
              });
              
              pm.test("Reset should have expiration time", function () {
                  pm.expect(responseJson.expires_in).to.not.be.empty;
                  
                  // Common expiration formats: "24 hours", "1 hour", etc.
                  pm.expect(responseJson.expires_in).to.match(/(hour|minute|day)/i);
              });
              
              pm.test("Success message should be informative", function () {
                  pm.expect(responseJson.message).to.include('reset');
                  pm.expect(responseJson.message).to.include('email');
              });
          }
      });
      
      // Security validation
      pm.test("Security best practices validation", function () {
          if (pm.response.code === 404) {
              pm.test("User enumeration protection", function () {
                  // Should not reveal whether email exists or not
                  const responseJson = pm.response.json();
                  pm.expect(responseJson.error).to.not.include('exists');
                  pm.expect(responseJson.error).to.not.include('registered');
              });
          }
          
          if (pm.response.code === 200) {
              pm.test("No sensitive information in response", function () {
                  const responseText = pm.response.text();
                  pm.expect(responseText).to.not.include('token');
                  pm.expect(responseText).to.not.include('password');
                  pm.expect(responseText).to.not.include('hash');
              });
          }
      });
    language: text/javascript