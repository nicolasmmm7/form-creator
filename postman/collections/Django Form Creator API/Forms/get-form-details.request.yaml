$kind: http-request
name: Get Form Details
method: GET
url: '{{base_url}}/api/formularios/{{form_id}}/'
order: 3000
headers:
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: form_id
    value: '{{form_id}}'
    description: Form ID to retrieve