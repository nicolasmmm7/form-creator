$kind: http-request
name: Send Form Invitations
method: POST
url: '{{base_url}}/api/formularios/{{form_id}}/invitar/'
order: 10000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: form_id
    value: '{{form_id}}'
    description: Form ID to send invitations for
body:
  type: json
  content: |-
    {
      "emails": [
        "user1@example.com",
        "user2@example.com",
        "user3@example.com"
      ],
      "message": "You have been invited to fill out our customer feedback form. Please click the link to participate."
    }