$kind: http-request
name: Update Form
method: PUT
url: '{{base_url}}/api/formularios/{{form_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: form_id
    value: '{{form_id}}'
    description: Form ID to update
body:
  type: json
  content: |-
    {
      "titulo": "Updated Customer Feedback Form",
      "descripcion": "An updated form to collect customer feedback and suggestions",
      "preguntas": [
        {
          "id": "q1",
          "tipo": "texto_libre",
          "enunciado": "What is your full name?",
          "obligatorio": true,
          "validaciones": {
            "longitud_minima": 3,
            "longitud_maxima": 100
          },
          "posicion": 1
        },
        {
          "id": "q2",
          "tipo": "opcion_multiple",
          "enunciado": "How would you rate our overall service?",
          "obligatorio": true,
          "opciones": ["Excellent", "Good", "Average", "Poor", "Very Poor"],
          "posicion": 2
        }
      ],
      "configuracion": {
        "es_publico": false,
        "usuarios_autorizados": ["{{user_id}}"],
        "requerir_login": true
      }
    }