$kind: http-request
name: Delete Form
method: DELETE
url: '{{base_url}}/api/formularios/{{form_id}}/'
order: 5000
headers:
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: form_id
    value: '{{form_id}}'
    description: Form ID to delete