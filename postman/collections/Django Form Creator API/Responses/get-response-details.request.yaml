$kind: http-request
name: Get Response Details
method: GET
url: '{{base_url}}/api/respuestas/{{response_id}}/'
order: 3000
headers:
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: response_id
    value: '{{response_id}}'
    description: Response ID to retrieve