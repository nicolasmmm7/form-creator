$kind: http-request
name: Update Response
method: PUT
url: '{{base_url}}/api/respuestas/{{response_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{firebase_token}}'
pathVariables:
  - key: response_id
    value: '{{response_id}}'
    description: Response ID to update
body:
  type: json
  content: |-
    {
      "respuestas": [
        {
          "pregunta_id": "q1",
          "valor": "John Smith Updated"
        },
        {
          "pregunta_id": "q2",
          "valor": "Excellent"
        },
        {
          "pregunta_id": "q3",
          "valor": 10
        },
        {
          "pregunta_id": "q4",
          "valor": ["Feature A", "Feature B", "Feature D"]
        }
      ]
    }